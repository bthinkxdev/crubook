# Nginx — authorthinks.bthinkx.com
# Place at: /etc/nginx/sites-available/authorthinks.bthinkx.com
# Then: ln -s /etc/nginx/sites-available/authorthinks.bthinkx.com /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name authorthinks.bthinkx.com www.authorthinks.bthinkx.com;

    # Uncomment after certbot:
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    location /static/ {
        alias /opt/crubook/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /opt/crubook/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;
    }
}

# After: certbot --nginx -d authorthinks.bthinkx.com -d www.authorthinks.bthinkx.com
# Certbot will add the SSL server block automatically.
